# =====================================================================
# 杉山先生の実務ナレッジ（過去191本の完成台本から抽出）
# =====================================================================
# ここにあるのは「ネットで調べれば出る一般論」ではなく、33年の実務からくる
# 目安・相場・落とし穴。台本を"調べれば出る情報の寄せ集め"から一段抜けさせるための材料。
#
# 使い方の注意（重要）:
# - 数値・相場・期間はすべて杉山先生の「実務上の目安」。台本では断定せず
#   「目安として」「ケースによります」等を添える。法律の条文と混同しない。
# - ここに無いことを数字で"発明"しない（捏造厳禁）。最終確認は先生が行う前提。
# - テーマに関係する項目だけが台本生成時に差し込まれる（キーワード一致）。
# - 追記・修正歓迎。先生が「これも入れて」と言った実務知はここに足す。

knowledge:
  - topic: 任意整理の実務
    keywords: [任意整理, 和解, 将来利息, 分割, おまとめ, 交渉]
    points:
      - "任意整理は元本は減らず、将来利息のカット＋長期の分割払い（36〜60回／3〜5年）に組み直すのが基本。"
      - "和解に応じてもらえるかの目安：減額後を3〜5年で完済できる返済力が要る。借金額のおおむね3倍以下の年収だと応じてもらえないことが多い。"
      - "取引期間が短いと不利：消費者金融は目安2〜3年、銀行系は最低でも半年以上の返済履歴があると交渉が柔軟。1年未満だと希望条件は通りにくい。"
      - "2回目の任意整理、代理人を頻繁に乗り換えているケース、一切和解に応じない債権者が混じるケースは、和解が難しくなる。"
      - "最近の傾向：将来利息の全額カットが認められにくくなり、5%程度付けての和解も増えている。長期分割も渋られる傾向。"
      - "任意整理が“損”になることもある：①元々返済期間が長く金利も高くない ②借入総額が少ない、ようなケース。"

  - topic: 個人再生
    keywords: [個人再生, 民事再生, 住宅ローン特則, 住宅資金, 家を残]
    points:
      - "借金を約5分の1に圧縮し、原則3〜5年で返済。住宅ローン特則（住宅資金特別条項）を使えば家を残せる。"
      - "住宅ローン特則には要件がある（本人所有で居住／抵当権が住宅ローンのためのもの／安定収入 等）。"
      - "再生計画では債務総額を最低ラインより下げられない（例：最低弁済額の下限があり、ゼロにはできない）。"
      - "代位弁済されても、6か月以内に個人再生を申し立てれば“巻き戻し”で家を守れる場合がある（時間との勝負）。"

  - topic: 自己破産
    keywords: [自己破産, 免責, 破産, 財産, 換価, 職業制限]
    points:
      - "手元に残せる現金は原則99万円まで（自由財産）。生活に必要な家財は取り上げられない。"
      - "財産処分の裁判所の目安は20万円以上。車も中古売却で20万円以上なら引き上げ対象（登録から5年ほど経つと価額0円扱いになる場合が多い）。"
      - "ギャンブルや浪費が原因でも、実際に免責が不許可になるケースはごくわずか（多くは裁量免責で認められる）。ただし断定はしない。"
      - "免責されても消えない債権がある：税金・社会保険料、養育費、故意・重過失の不法行為による損害賠償 など。"
      - "自己破産の落とし穴：①財産や借入の虚偽申告 ②一部の債権者だけへの返済（偏頗弁済）③離婚時の財産分与 ④クレカ商品の現金化。"

  - topic: 信用情報・ブラックリスト
    keywords: [ブラックリスト, 信用情報, 事故情報, カード, ローン, スマホ, 賃貸, 審査]
    points:
      - "事故情報の登録期間の目安：任意整理は完済から5年、自己破産は免責決定から5〜7年。"
      - "生活への実影響：スマホの高額機種の分割購入ができない、クレカの新規作成が難しい、賃貸で保証会社の審査が通りにくくなる。"

  - topic: 督促・滞納・期限の利益
    keywords: [滞納, 督促, 期限の利益, 差し押さえ, 差押, 給料, 辞任]
    points:
      - "給料の差押えは手取りの4分の1まで（4分の3は支給される）。"
      - "「期限の利益」の喪失は、契約上「2回分の滞納」で規定されていることが多い。1回の滞納では通常は失われない。"
      - "返済が滞ると1か月ほどで督促が始まり、郵便での督促が来ると同居家族にバレる可能性が高まる。"

  - topic: 賃貸・引っ越し
    keywords: [賃貸, 引っ越し, 家賃, 入居, 審査, アパート]
    points:
      - "家賃1か月の滞納では即解除にはならず、2〜3か月の滞納で初めて解除が認められることが多い。"
      - "いまは賃貸契約の多くで保証会社の保証が求められ、事故情報があると審査で不利になりやすい。"

  - topic: 時効の援用
    keywords: [時効, 援用, 古い借金, 放置]
    points:
      - "時効期間が過ぎても「承認」（借金を認める発言や一部返済）をすると時効が更新（リセット）されるので要注意。安易に払わない・認めない。"

  - topic: 相続と借金
    keywords: [相続, 相続放棄, 親の借金, 遺産, 故人]
    points:
      - "相続放棄は原則“知ってから3か月以内”。ただし3か月を過ぎても、借金の存在を知らなかった等の事情で認められる場合がある（諦めない）。"

  - topic: リボ・分割・クレカ
    keywords: [リボ, 分割払い, クレジット, クレカ]
    points:
      - "リボ・分割の金利は15%前後が相場。自動リボ設定で知らぬ間に残高が膨らむのが典型的な落とし穴。"

  - topic: 詐欺・闇金・現金化
    keywords: [闇金, 詐欺, 現金化, ファクタリング, 副業, 特殊詐欺]
    points:
      - "給料ファクタリング等は手数料を年利換算すると法外な高利になる（実質、闇金と同様の危険）。"
      - "特殊詐欺はDM起点が8割以上。若年層（スマホ完結）と50〜60代が特に狙われやすい。"

  - topic: 依頼先の選び方・費用
    keywords: [事務所, 依頼先, 選び方, 弁護士, 司法書士, 費用, 相談]
    points:
      - "依頼先選びの4ポイント：弁護士か司法書士か／費用／実績／相性（連絡の取りやすさ）。"
      - "司法書士は1社あたりの債権額が140万円を超えると代理できない。個人再生・自己破産の代理もできない。"
      - "費用の相場の目安：自己破産・個人再生は30〜50万円、任意整理は1社あたり5〜8万円ほど。着手金の分割に応じる事務所も多い。"
